spring.application.name=streammetrics-backend

server.port=${SERVER_PORT:8080}
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,capacitor://localhost,http://localhost

spring.cache.type=simple
spring.cache.cache-names=dashboardResumen,consumoGeneros,mercadosConsumo,planesConsumo,metasCumplimiento,perfilesActividad,contenidosDesempeno,reporteEjecutivoResumen