spring.application.name=streammetrics-backend

server.port=8080

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:netflixdos}?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,capacitor://localhost,http://localhost

spring.cache.type=simple
spring.cache.cache-names=dashboardResumen,consumoGeneros,mercadosConsumo,planesConsumo,metasCumplimiento,perfilesActividad,contenidosDesempeno,reporteEjecutivoResumen
spring.jpa.open-in-view=false